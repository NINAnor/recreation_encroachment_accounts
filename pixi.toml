[workspace]
authors = ["Niccolo Cantu <niccolo.cantu@nina.no>"]
channels = ["conda-forge"]
name = "recereation_encroachment_accounts"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
preview = "quarto preview"
render = "quarto render"

[activation]
env = { LANG = "en_US.UTF-8", LC_ALL = "en_US.UTF-8" }

[dependencies]
r-base = ">=4.5.2,<4.6"
quarto = ">=1.8.27,<2"
r-rmarkdown = ">=2.30,<3"
r-tidyverse = ">=2.0.0,<3"
r-knitr = ">=1.51,<2"
r-kableextra = ">=1.4.0,<2"
r-here = ">=1.0.2,<2"
r-yaml = ">=2.3.12,<3"
r-tibble = ">=3.3.1,<4"
r-conflicted = ">=1.2.0,<2"
r-httr2 = ">=1.2.2,<2"
r-jsonlite = ">=2.0.0,<3"
r-sf = ">=1.1_0,<2"
r-purrr = ">=1.2.1,<2"
r-dt = ">=0.34.0,<0.35"
r-xml2 = ">=1.5.2,<2"
r-diagrammer = ">=1.0.11,<2"
r-rsvg = ">=2.6.1,<3"
r-downlit = ">=0.4.5,<0.5"
r-diagrammersvg = ">=0.1,<0.2"
r-tmap = ">=4.2,<5"
r-codetools = ">=0.2_20,<0.3"
